<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Блокировка масштабирования и зума -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Трекер похудения</title>
    <link rel="icon" href="https://fav.farm/🏋️‍♂️" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --neon: #9EFF00;
            --bg-dark: #070B0D;
            --glass-bg: rgba(17, 23, 27, 0.6);
            --glass-border: rgba(255, 255, 255, 0.06);
        }
        
        body { 
            background-color: var(--bg-dark); 
            color: #E2E8F0; 
            font-family: system-ui, -apple-system, sans-serif;
            position: relative;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* Ambient Background Orbs */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            pointer-events: none;
        }
        body::before {
            top: -100px;
            left: -100px;
            background: rgba(158, 255, 0, 0.15);
        }
        body::after {
            bottom: 20%;
            right: -100px;
            background: rgba(56, 189, 248, 0.1);
        }

        .glass-card { 
            background-color: var(--glass-bg); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .day-btn { 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #94A3B8; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .day-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
            color: #FFF;
        }
        .day-btn.active { 
            background: var(--neon);
            color: var(--bg-dark); 
            font-weight: 800; 
            border-color: var(--neon);
            box-shadow: 0 0 20px rgba(158, 255, 0, 0.3);
        }
        .day-btn.completed { 
            border: 1px solid #38BDF8;
            background: rgba(56, 189, 248, 0.05);
        }

        .tech-input {
            background: rgba(0, 0, 0, 0.3);
            color: #FFF;
            border: 1px solid rgba(255, 255, 255, 0.08);
            outline: none;
            transition: all 0.3s ease;
        }
        .tech-input:focus {
            border-color: var(--neon);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: inset 0 0 0 1px var(--neon), 0 0 12px rgba(158, 255, 0, 0.15);
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }

        .cyber-checkbox {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.3);
            display: grid;
            place-content: center;
            cursor: pointer;
        }
        .cyber-checkbox::before {
            content: "";
            width: 12px;
            height: 12px;
            border-radius: 3px;
            transform: scale(0);
            transition: 0.2s transform ease-in-out;
            background: var(--neon);
        }
        .cyber-checkbox:checked { border-color: var(--neon); }
        .cyber-checkbox:checked::before { transform: scale(1); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-24 selection:bg-[#9EFF00] selection:text-black">

    <!-- HEADER -->
    <header class="mb-8 text-center pt-4">
        <h1 class="text-3xl font-black tracking-tight uppercase mb-2">
            <span class="bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">Протокол</span>
            <span style="color: var(--neon); text-shadow: 0 0 20px rgba(158,255,0,0.3);">похудения</span>
        </h1>
        <div class="inline-block glass-card px-4 py-2 mt-2">
            <p class="text-[11px] text-slate-400 font-medium tracking-wide">
                Вес: <span id="header-weight" class="text-white font-bold text-sm">—</span> <span class="text-slate-500 mr-2">кг</span>
                Ккал: <span class="font-bold text-sm" style="color: var(--neon);">1800</span> <span class="text-slate-600 mx-1">/</span> <span id="header-calories" class="text-white font-bold text-sm">0</span>
            </p>
        </div>
    </header>

    <button onclick="openArchiveModal()" class="w-full glass-card hover:bg-white/5 text-white font-bold py-3.5 px-4 text-xs uppercase tracking-widest flex items-center justify-center gap-2 mb-6 transition-all cursor-pointer active:scale-[0.98]">
        📂 Открыть архив и базу весов
    </button>

    <div class="glass-card p-5 mb-6">
        <div class="flex justify-between items-center mb-4 border-b border-white/5 pb-3">
            <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Календарь</h3>
            <span id="current-week-label" class="text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded bg-[#9EFF00]/10 text-[#9EFF00]">Неделя 1</span>
        </div>
        <div id="calendar-grid" class="grid grid-cols-4 gap-2 text-center text-xs"></div>
        <div class="mt-4 p-3.5 rounded-xl tech-input bg-black/20 border-white/5 flex gap-3 items-start">
            <span class="text-lg leading-none opacity-50">💡</span>
            <p id="week-desc" class="text-xs italic text-slate-400 leading-relaxed"></p>
        </div>
    </div>

    <div class="glass-card p-5 mb-6">
        <div class="flex justify-between items-center mb-5 border-b border-white/5 pb-3">
            <h3 id="health-title" class="text-sm font-bold uppercase tracking-widest text-white">🩺 Параметры</h3>
        </div>
        <div class="grid grid-cols-3 gap-3 mb-4">
            <div>
                <label class="block text-[9px] mb-1.5 text-center text-slate-400 uppercase font-semibold tracking-widest">Вес (кг)</label>
                <input type="number" step="0.1" id="input-weight" oninput="autoSaveDayData()" placeholder="—" class="w-full tech-input rounded-xl p-3 text-sm text-center font-bold">
            </div>
            <div>
                <label class="block text-[9px] mb-1.5 text-center text-slate-400 uppercase font-semibold tracking-widest">Ккал План</label>
                <input type="number" id="input-calories-target" oninput="autoSaveDayData()" placeholder="1800" class="w-full tech-input rounded-xl p-3 text-sm text-center font-semibold text-slate-300">
            </div>
            <div>
                <label class="block text-[9px] mb-1.5 text-center text-slate-400 uppercase font-semibold tracking-widest">Ккал Факт</label>
                <input type="number" id="input-calories-fact" oninput="autoSaveDayData()" placeholder="0" class="w-full tech-input rounded-xl p-3 text-sm text-center font-black" style="color: var(--neon); background: rgba(158, 255, 0, 0.02);">
            </div>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div>
                <label class="block text-[9px] mb-1.5 text-slate-400 uppercase font-semibold tracking-widest">Шаги</label>
                <input type="number" id="input-steps" oninput="autoSaveDayData()" placeholder="15 000" class="w-full tech-input rounded-xl p-3 text-sm text-center font-bold text-sky-300">
            </div>
            <div>
                <label class="block text-[9px] mb-1.5 text-slate-400 uppercase font-semibold tracking-widest">Пульс</label>
                <input type="number" id="input-pulse" oninput="autoSaveDayData()" placeholder="уд/мин" class="w-full tech-input rounded-xl p-3 text-sm text-center">
            </div>
        </div>
        <div class="mb-4">
            <label class="block text-[9px] mb-1.5 text-slate-400 uppercase font-semibold tracking-widest">Состояние ЖКТ</label>
            <input type="text" id="input-gastro" oninput="autoSaveDayData()" placeholder="Опишите состояние..." class="w-full tech-input rounded-xl p-3 text-xs">
        </div>
        <div class="mb-1">
            <label class="block text-[9px] mb-1.5 text-slate-400 uppercase font-semibold tracking-widest">Менталка & Тонус</label>
            <textarea id="input-notes" oninput="autoSaveDayData()" rows="2" placeholder="Как сон, общая энергия?..." class="w-full tech-input rounded-xl p-3 text-xs resize-none"></textarea>
        </div>
    </div>

    <div id="health-alert" class="hidden p-4 rounded-xl text-xs bg-red-950/40 border border-red-500/30 text-red-300 mb-6 glass-card leading-relaxed"></div>

    <div class="glass-card p-5 mb-6">
        <div class="flex justify-between items-center mb-5 border-b border-white/5 pb-3">
            <h3 class="text-sm font-bold uppercase tracking-widest text-white">🏋️‍♂️ Тренировка</h3>
            <span id="exercise-count" class="text-[10px] font-mono font-bold text-slate-500 bg-white/5 px-2 py-1 rounded">0/30</span>
        </div>
        <div class="mb-5">
            <label class="block text-[9px] mb-1.5 text-slate-400 uppercase font-semibold tracking-widest">Самочувствие</label>
            <input type="text" id="input-workout-state" oninput="autoSaveDayData()" placeholder="Памп, слабость..." class="w-full tech-input rounded-xl p-3 text-xs italic text-slate-300">
        </div>
        <div class="grid grid-cols-12 gap-1.5 mb-2 px-1 text-[8px] uppercase font-bold text-center text-slate-500 tracking-widest">
            <div class="col-span-5 text-left">Упражнение</div>
            <div class="col-span-2">Подх</div>
            <div class="col-span-3">Повт/Вр</div>
            <div class="col-span-2">Вес</div>
        </div>
        <div id="workout-container" class="space-y-3 mb-5"></div>
        <button onclick="addExerciseField()" id="btn-add-exercise" class="w-full bg-white/5 hover:bg-white/10 border border-dashed border-white/10 text-slate-400 py-3.5 rounded-xl text-xs font-bold transition-all cursor-pointer active:scale-[0.98]">
            + Добавить упражнение
        </button>
    </div>

    <div class="glass-card p-5 mb-6">
        <div class="flex justify-between items-center mb-5 border-b border-white/5 pb-3">
            <h3 id="checklist-title" class="text-sm font-bold uppercase tracking-widest text-white">📋 Режим & Диета</h3>
            <span id="day-progress" class="text-xs font-black tracking-widest px-2.5 py-1 rounded bg-[#9EFF00]/10 text-[#9EFF00] border border-[#9EFF00]/20">0%</span>
        </div>
        <div id="checklist-container" class="space-y-3 mb-5"></div>
        <div class="flex gap-2 mb-5 pt-4 border-t border-white/5">
            <input type="text" id="new-task-text" placeholder="Добавить свою задачу..." class="flex-1 tech-input rounded-xl p-3 text-xs">
            <button onclick="addNewCustomTask()" class="bg-[#9EFF00] text-black font-black px-5 rounded-xl text-lg transition-all cursor-pointer active:scale-95">+</button>
        </div>
        <div>
            <label class="block text-[9px] mb-1.5 text-slate-400 uppercase font-semibold tracking-widest">Заметки по диете</label>
            <textarea id="input-diet-notes" oninput="autoSaveDayData()" rows="2" placeholder="Тайминги, читмилы..." class="w-full tech-input rounded-xl p-3 text-xs resize-none"></textarea>
        </div>
    </div>

    <div class="glass-card p-5">
        <h3 class="text-[10px] font-bold tracking-widest mb-4 uppercase text-slate-500 text-center">Система управления</h3>
        <div class="space-y-2.5">
            <button onclick="exportTextReport()" class="w-full bg-white/5 hover:bg-white/10 border border-white/5 text-white font-bold py-3 px-4 rounded-xl text-xs transition-all cursor-pointer text-center">
                📋 Скачать отчет (.txt)
            </button>
            <div class="flex gap-2">
                <button onclick="exportData()" class="flex-1 bg-black/30 border border-white/5 text-slate-400 text-[10px] uppercase py-2.5 px-2 rounded-xl font-bold transition-all cursor-pointer">📥 Бэкап</button>
                <button onclick="importData()" class="flex-1 bg-black/30 border border-white/5 text-slate-400 text-[10px] uppercase py-2.5 px-2 rounded-xl font-bold transition-all cursor-pointer">📤 Импорт</button>
            </div>
            <button onclick="resetChecklist()" class="w-full text-red-400/70 text-[10px] uppercase py-3 px-3 rounded-xl transition-all mt-2 bg-red-900/10 active:scale-98">
                ⚠️ Сбросить день
            </button>
        </div>
    </div>

    <div id="archive-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md" onclick="closeArchiveModal()"></div>
        <div class="glass-card w-full max-w-md max-h-[85vh] flex flex-col p-6 relative z-10 shadow-2xl border-white/10">
            <div class="flex justify-between items-center pb-4 border-b border-white/5">
                <h2 class="text-sm font-black uppercase text-white tracking-widest">База & Архив</h2>
                <button onclick="closeArchiveModal()" class="text-slate-500 hover:text-white font-bold text-xl cursor-pointer">✕</button>
            </div>
            <div class="p-4 rounded-2xl mt-5 bg-black/30 border border-white/5">
                <h3 class="text-[10px] font-bold uppercase mb-3 tracking-widest" style="color: var(--neon);">🏋️‍♂️ Поиск весов</h3>
                <select id="exercise-weight-selector" onchange="displayLastWorkingWeight()" class="w-full tech-input rounded-xl p-3 text-xs focus:outline-none appearance-none cursor-pointer">
                </select>
                <div id="last-weight-display" class="mt-3 p-4 bg-black/40 rounded-xl text-center text-xs min-h-[50px] flex items-center justify-center font-semibold border border-white/5">
                    <span class="text-slate-600">Выберите упражнение...</span>
                </div>
            </div>
            <h3 class="text-[10px] font-bold uppercase mt-6 mb-3 tracking-widest text-slate-500">📋 Исторический лог</h3>
            <div id="archive-content" class="overflow-y-auto flex-1 space-y-4 pr-2 text-xs text-slate-300"></div>
        </div>
    </div>

    <script>
        const startDate = new Date(2026, 6, 20); 
        const DB_KEY = 'sushka_db_v11'; 

        function getDateStringForDay(dayIndex) {
            const currentDayDate = new Date(startDate);
            currentDayDate.setDate(startDate.getDate() + (dayIndex - 1));
            const d = String(currentDayDate.getDate()).padStart(2, '0');
            const m = String(currentDayDate.getMonth() + 1).padStart(2, '0');
            return `${d}.${m}`;
        }

        const weekProtocols = {
            1: { desc: "Неделя 1 — Мягкий старт. Лимит жиров 40-50г.", tasks: [ { id: "cal", txt: "Уложиться в лимит калорий" }, { id: "prot", txt: "Белок: 220–250 г" }, { id: "fat", txt: "Жиры: 40-50 г" }, { id: "carb", txt: "Углеводы: 60-80 г" }, { id: "cardio", txt: "Активность: 30 мин LISS" } ] },
            2: { desc: "Неделя 2 — Дефицит. Контроль нагрузок.", tasks: [ { id: "cal", txt: "Уложиться в лимит калорий" }, { id: "prot", txt: "Белок: 220–250 г" }, { id: "fat", txt: "Жиры: 40-50 г" }, { id: "cardio", txt: "Активность: 40 мин LISS" } ] },
            3: { desc: "Неделя 3 — Хардкор. Пик сушки.", tasks: [ { id: "cal", txt: "Уложиться в лимит калорий" }, { id: "prot", txt: "Белок: максимум" }, { id: "fat", txt: "Жиры: 40 г" }, { id: "cardio", txt: "Активность: 40 мин LISS" } ] },
            4: { desc: "Неделя 4 — Выход из режима.", tasks: [ { id: "cal", txt: "Уложиться в лимит калорий" }, { id: "prot", txt: "Белок: 220 г" }, { id: "fat", txt: "Жиры: 40-50 г" }, { id: "cardio", txt: "Активность: 30 мин LISS" } ] }
        };

        const historicalWorkouts = [
            { date: "18.07.2026", exercises: [ { name: "Пресс скручивания", sets: "3", reps: "1 мин", weight: "10 кг" }, { name: "Присед", sets: "3", reps: "7", weight: "52.5 кг" } ] },
            { date: "15.07.2026", exercises: [ { name: "Вертикальная тяга", sets: "3", reps: "12", weight: "43 кг" }, { name: "Жим лежа", sets: "3", reps: "10", weight: "55 кг" } ] }
        ];

        let selectedDay = localStorage.getItem('sushka_selected_day') ? parseInt(localStorage.getItem('sushka_selected_day')) : 1;
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || {};

        const calendarGrid = document.getElementById('calendar-grid');
        const currentWeekLabel = document.getElementById('current-week-label');
        const weekDesc = document.getElementById('week-desc');
        const checklistContainer = document.getElementById('checklist-container');
        const healthTitle = document.getElementById('health-title');
        const dayProgressLabel = document.getElementById('day-progress');
        const headerWeight = document.getElementById('header-weight');
        const headerCalories = document.getElementById('header-calories');
        const workoutContainer = document.getElementById('workout-container');
        const exerciseCountLabel = document.getElementById('exercise-count');

        buildCalendar();
        loadDay(selectedDay);

        function buildCalendar() {
            calendarGrid.innerHTML = '';
            for (let i = 1; i <= 28; i++) {
                const btn = document.createElement('button');
                btn.id = `btn-day-${i}`;
                btn.className = `day-btn p-3 rounded-2xl flex flex-col items-center justify-center gap-1 cursor-pointer font-medium`;
                btn.innerHTML = `<span class="opacity-50 text-[9px] uppercase font-mono tracking-wider">Day ${i}</span><span class="font-bold text-sm leading-none">${getDateStringForDay(i)}</span>`;
                if (isDayFullyCompleted(i)) btn.classList.add('completed');
                btn.onclick = () => { selectedDay = i; localStorage.setItem('sushka_selected_day', selectedDay); loadDay(i); };
                calendarGrid.appendChild(btn);
            }
        }

        function getWeekFromDay(day) { return Math.ceil(day / 7); }

        function isDayFullyCompleted(day) {
            const dayKey = `day${day}`;
            const week = getWeekFromDay(day);
            const totalBaseTasks = weekProtocols[week].tasks.length;
            if (!db[dayKey] || !db[dayKey].tasks) return false;
            const customTasksCount = db[dayKey].customTasks ? db[dayKey].customTasks.length : 0;
            const totalRequired = totalBaseTasks + customTasksCount;
            const checkedBaseCount = Object.values(db[dayKey].tasks).filter(Boolean).length;
            const checkedCustomCount = db[dayKey].customTasks ? db[dayKey].customTasks.filter(t => t.checked).length : 0;
            return (checkedBaseCount + checkedCustomCount) === totalRequired;
        }

        function updateHeaderData() {
            const dayKey = `day${selectedDay}`;
            const h = db[dayKey]?.health || {};
            if (h.weight) headerWeight.innerText = h.weight; else headerWeight.innerText = '—';
            headerCalories.innerText = h.caloriesFact || '0';
        }

        function loadDay(day) {
            const week = getWeekFromDay(day);
            const proto = weekProtocols[week];
            const dayKey = `day${day}`;
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-day-${day}`);
            if (activeBtn) activeBtn.classList.add('active');
            currentWeekLabel.innerText = `Неделя ${week}`;
            weekDesc.innerHTML = `<span class="text-white font-medium mr-1">Фокус:</span> ${proto.desc}`;
            healthTitle.innerText = `🩺 Параметры (${getDateStringForDay(day)})`;
            if (!db[dayKey]) db[dayKey] = { tasks: {}, customTasks: [], health: {}, exercises: [] };
            if (!db[dayKey].health) db[dayKey].health = { weight: '', caloriesFact: '', steps: '', pulse: '', gastro: '', notes: '', workoutState: '', dietNotes: '' };
            const h = db[dayKey].health;
            document.getElementById('input-weight').value = h.weight || '';
            document.getElementById('input-calories-fact').value = h.caloriesFact || '';
            document.getElementById('input-steps').value = h.steps || '';
            document.getElementById('input-pulse').value = h.pulse || '';
            document.getElementById('input-gastro').value = h.gastro || '';
            document.getElementById('input-notes').value = h.notes || '';
            document.getElementById('input-workout-state').value = h.workoutState || '';
            document.getElementById('input-diet-notes').value = h.dietNotes || '';
            renderChecklist(proto.tasks, db[dayKey].tasks, db[dayKey].customTasks);
            renderWorkoutFields(db[dayKey].exercises);
            updateHeaderData();
            updateProgress();
            checkLiveAlerts();
        }

        function renderChecklist(baseTasks, checkedBase, customTasks) {
            checklistContainer.innerHTML = '';
            baseTasks.forEach(task => {
                const isChecked = checkedBase[task.id] ? 'checked' : '';
                const div = document.createElement('div');
                div.className = "flex items-start p-3.5 bg-black/20 rounded-xl border border-white/5";
                div.innerHTML = `<input type="checkbox" id="${task.id}" ${isChecked} onchange="toggleTask('${task.id}', false)" class="cyber-checkbox mt-0.5">
                    <label for="${task.id}" class="ml-4 text-sm text-slate-300 font-medium pt-0.5">${task.txt}</label>`;
                checklistContainer.appendChild(div);
            });
            customTasks.forEach((task, index) => {
                const isChecked = task.checked ? 'checked' : '';
                const div = document.createElement('div');
                div.className = "flex items-start p-3.5 bg-black/20 rounded-xl border border-dashed border-white/10";
                div.innerHTML = `<input type="checkbox" id="custom-${index}" ${isChecked} onchange="toggleTask(${index}, true)" class="cyber-checkbox mt-0.5">
                    <label for="custom-${index}" class="ml-4 text-sm text-slate-300 font-medium pt-0.5 flex-1">${task.txt}</label>
                    <button onclick="deleteCustomTask(${index})" class="text-slate-500 hover:text-red-400 ml-2">✕</button>`;
                checklistContainer.appendChild(div);
            });
        }

        window.autoSaveDayData = function() {
            const dayKey = `day${selectedDay}`;
            db[dayKey].health = { weight: document.getElementById('input-weight').value, caloriesFact: document.getElementById('input-calories-fact').value, steps: document.getElementById('input-steps').value, pulse: document.getElementById('input-pulse').value, gastro: document.getElementById('input-gastro').value, notes: document.getElementById('input-notes').value, workoutState: document.getElementById('input-workout-state').value, dietNotes: document.getElementById('input-diet-notes').value };
            const rows = workoutContainer.getElementsByClassName('exercise-row');
            const savedExercises = [];
            for (let row of rows) {
                const name = row.querySelector('.ex-name').value.trim();
                if (name) savedExercises.push({ name: name, sets: row.querySelector('.ex-sets').value, reps: row.querySelector('.ex-reps').value, weight: row.querySelector('.ex-weight').value });
            }
            db[dayKey].exercises = savedExercises;
            saveDB();
            updateHeaderData();
            checkLiveAlerts();
            const btn = document.getElementById(`btn-day-${selectedDay}`);
            if (isDayFullyCompleted(selectedDay)) btn.classList.add('completed'); else btn.classList.remove('completed');
        }

        function checkLiveAlerts() {
            const alertDiv = document.getElementById('health-alert');
            const pulse = parseInt(document.getElementById('input-pulse').value);
            let alerts = [];
            if (pulse > 75) alerts.push("⚠️ Пульс высоковат.");
            if (alerts.length > 0) { alertDiv.innerHTML = alerts.join('<br>'); alertDiv.classList.remove('hidden'); } else alertDiv.classList.add('hidden');
        }

        window.addNewCustomTask = function() {
            const input = document.getElementById('new-task-text');
            const txt = input.value.trim();
            if (!txt) return;
            db[`day${selectedDay}`].customTasks.push({ txt, checked: false });
            saveDB();
            input.value = '';
            loadDay(selectedDay);
        }

        window.deleteCustomTask = function(index) {
            db[`day${selectedDay}`].customTasks.splice(index, 1);
            saveDB();
            loadDay(selectedDay);
        }

        window.toggleTask = function(id, isCustom) {
            const dayKey = `day${selectedDay}`;
            if (isCustom) db[dayKey].customTasks[id].checked = document.getElementById(`custom-${id}`).checked;
            else db[dayKey].tasks[id] = document.getElementById(id).checked;
            saveDB();
            updateProgress();
            loadDay(selectedDay);
        }

        function updateProgress() {
            const week = getWeekFromDay(selectedDay);
            const total = weekProtocols[week].tasks.length + db[`day${selectedDay}`].customTasks.length;
            const checked = Object.values(db[`day${selectedDay}`].tasks).filter(Boolean).length + db[`day${selectedDay}`].customTasks.filter(t => t.checked).length;
            dayProgressLabel.innerText = total > 0 ? Math.round((checked / total) * 100) + '%' : '0%';
        }

        function renderWorkoutFields(exercisesArr) {
            workoutContainer.innerHTML = '';
            const fieldsCount = Math.max(2, exercisesArr.length);
            for (let i = 0; i < fieldsCount; i++) {
                const ex = exercisesArr[i] || { name: '', sets: '', reps: '', weight: '' };
                const div = document.createElement('div');
                div.className = "grid grid-cols-12 gap-2 items-center exercise-row";
                div.innerHTML = `<input type="text" placeholder="Упр." value="${ex.name}" oninput="autoSaveDayData()" class="col-span-5 tech-input rounded-xl p-3 text-xs ex-name">
                                 <input type="number" placeholder="4" value="${ex.sets}" oninput="autoSaveDayData()" class="col-span-2 tech-input rounded-xl p-3 text-xs text-center ex-sets">
                                 <input type="text" placeholder="12" value="${ex.reps}" oninput="autoSaveDayData()" class="col-span-3 tech-input rounded-xl p-3 text-xs text-center ex-reps">
                                 <input type="text" placeholder="80" value="${ex.weight}" oninput="autoSaveDayData()" class="col-span-2 tech-input rounded-xl p-3 text-xs text-center text-[#9EFF00] font-bold ex-weight bg-black/40">`;
                workoutContainer.appendChild(div);
            }
            exerciseCountLabel.innerText = `${workoutContainer.children.length}/30`;
        }

        function addExerciseField() { if (workoutContainer.children.length < 30) renderWorkoutFields([...db[`day${selectedDay}`].exercises, {name: '', sets: '', reps: '', weight: ''}]); }

        function saveDB() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }

        function resetChecklist() { if(confirm("Сбросить день?")) { db[`day${selectedDay}`] = { tasks: {}, customTasks: [], health: {}, exercises: [] }; saveDB(); loadDay(selectedDay); } }
        
        function openArchiveModal() { document.getElementById('archive-modal').classList.remove('hidden'); }
        function closeArchiveModal() { document.getElementById('archive-modal').classList.add('hidden'); }
        function displayLastWorkingWeight() {}
        function generateArchiveDOM() {}
        function exportTextReport() {}
        function exportData() {}
        function importData() {}
    </script>
</body>
</html>
