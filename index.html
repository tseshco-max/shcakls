<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Получение кода</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
    }

    .box {
        background: #1e1e1e;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 0 20px rgba(0,0,0,0.4);
        text-align: center;
        min-width: 320px;
    }

    h1 {
        margin-top: 0;
        font-size: 28px;
    }

    .code {
        font-size: 52px;
        font-weight: bold;
        color: #00ff99;
        margin: 20px 0;
        letter-spacing: 6px;
    }

    button {
        padding: 14px 28px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        background: #00ff99;
        color: black;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        opacity: 0.9;
    }

    .status {
        margin-top: 15px;
        color: #aaa;
        font-size: 14px;
    }
</style>
</head>
<body>

<div class="box">
    <h1>Ваш код</h1>
    <div class="code" id="code">-----</div>
    <button onclick="getCode()">Получить код</button>
    <div class="status" id="status"></div>
</div>

<script>
async function getCode() {
    const codeEl = document.getElementById("code");
    const statusEl = document.getElementById("status");

    codeEl.textContent = ".....";
    statusEl.textContent = "Загрузка...";

    try {
        const response = await fetch(
            "https://kosell.store/api/v1/rental/2ad76363-008a-4769-b636-4ec23dd64bf1/code",
            {
                method: "GET",
                headers: {
                    "X-API-Key": "kosell_ebc7d724c829084fc7d5717cdb130d33e668cb97ba06daed1eb25458"
                }
            }
        );

        const data = await response.json();

        if (data.success && data.code) {
            codeEl.textContent = data.code;
            statusEl.textContent = "Истекает через " + data.expires_in + " мин.";
        } else {
            codeEl.textContent = "ERROR";
            statusEl.textContent = data.error || "Не удалось получить код";
        }

    } catch (error) {
        codeEl.textContent = "ERROR";
        statusEl.textContent = "Ошибка соединения";
    }
}
</script>

</body>
</html>
