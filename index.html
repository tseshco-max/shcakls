<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекер похудения</title>
    <link rel="icon" href="https://fav.farm/🏋️‍♂️" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --neon: #9EFF00;
            --bg-dark: #070B0D;
            --glass-bg: rgba(17, 23, 27, 0.6);
            --glass-border: rgba(255, 255, 255, 0.06);
        }
        
        body { 
            background-color: var(--bg-dark); 
            color: #E2E8F0; 
            font-family: system-ui, -apple-system, sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            pointer-events: none;
        }
        body::before { top: -100px; left: -100px; background: rgba(158, 255, 0, 0.15); }
        body::after { bottom: 20%; right: -100px; background: rgba(56, 189, 248, 0.1); }

        .glass-card { 
            background-color: var(--glass-bg); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .day-btn { 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #94A3B8; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .day-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
            color: #FFF;
        }
        .day-btn.active { 
            background: var(--neon);
            color: var(--bg-dark); 
            font-weight: 800; 
            border-color: var(--neon);
            box-shadow: 0 0 20px rgba(158, 255, 0, 0.3);
        }
        .day-btn.completed { 
            border: 1px solid #38BDF8;
            background: rgba(56, 189, 248, 0.05);
        }

        .tech-input {
            background: rgba(0, 0, 0, 0.3);
            color: #FFF;
            border: 1px solid rgba(255, 255, 255, 0.08);
            outline: none;
            transition: all 0.3s ease;
        }
        .tech-input:focus {
            border-color: var(--neon);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: inset 0 0 0 1px var(--neon), 0 0 12px rgba(158, 255, 0, 0.15);
        }
        
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        .cyber-checkbox {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.3);
            display: grid;
            place-content: center;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .cyber-checkbox::before {
            content: "";
            width: 12px;
            height: 12px;
            border-radius: 3px;
            transform: scale(0);
            transition: 0.2s transform ease-in-out;
            background: var(--neon);
            box-shadow: 0 0 10px var(--neon);
        }
        .cyber-checkbox:checked { border-color: var(--neon); }
        .cyber-checkbox:checked::before { transform: scale(1); }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-24 selection:bg-[#9EFF00] selection:text-black">

    <header class="mb-8 text-center pt-4">
        <h1 class="text-3xl font-black tracking-tight uppercase mb-2">
            <span class="bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">Протокол</span>
            <span style="color: var(--neon); text-shadow: 0 0 20px rgba(158,255,0,0.3);">похудения</span>
        </h1>
    </header>

    <button onclick="openArchiveModal()" class="w-full glass-card hover:bg-white/5 text-white font-bold py-3.5 px-4 text-xs uppercase tracking-widest flex items-center justify-center gap-2 mb-6 transition-all duration-300 cursor-pointer active:scale-[0.98] group">
        <span class="group-hover:text-[#9EFF00] transition-colors">📂 Открыть архив и базу весов</span>
    </button>

    <div class="glass-card p-5 mb-6">
        <div class="flex justify-between items-center mb-4 border-b border-white/5 pb-3">
            <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Календарная сетка</h3>
            <span id="current-week-label" class="text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded bg-[#9EFF00]/10 text-[#9EFF00]">Неделя 1</span>
        </div>
        <div id="calendar-grid" class="grid grid-cols-4 gap-2 text-center text-xs"></div>
        <div class="mt-4 p-3.5 rounded-xl tech-input bg-black/20 border-white/5 flex gap-3 items-start">
            <p id="week-desc" class="text-xs italic text-slate-400 leading-relaxed"></p>
        </div>
    </div>

    <div class="glass-card p-5 mb-6">
        <h3 id="health-title" class="text-sm font-bold uppercase tracking-widest text-white mb-5">🩺 Параметры</h3>
        <div class="grid grid-cols-3 gap-3 mb-4">
            <div>
                <label class="block text-[9px] mb-1.5 text-center text-slate-400 uppercase font-semibold tracking-widest">Вес (кг)</label>
                <input type="number" step="0.1" id="input-weight" oninput="autoSaveDayData()" placeholder="—" class="w-full tech-input rounded-xl p-3 text-sm text-center font-bold">
            </div>
            <div>
                <label class="block text-[9px] mb-1.5 text-center text-slate-400 uppercase font-semibold tracking-widest">Ккал План</label>
                <input type="number" id="input-calories-target" oninput="autoSaveDayData()" placeholder="1800" class="w-full tech-input rounded-xl p-3 text-sm text-center font-semibold text-slate-300">
            </div>
            <div>
                <label class="block text-[9px] mb-1.5 text-center text-slate-400 uppercase font-semibold tracking-widest">Ккал Факт</label>
                <input type="number" id="input-calories-fact" oninput="autoSaveDayData()" placeholder="0" class="w-full tech-input rounded-xl p-3 text-sm text-center font-black" style="color: var(--neon);">
            </div>
        </div>
        <div class="mb-4">
            <label class="block text-[9px] mb-1.5 text-slate-400 uppercase font-semibold tracking-widest">Менталка & Тонус</label>
            <textarea id="input-notes" oninput="autoSaveDayData()" rows="2" placeholder="Как сон, общая энергия?..." class="w-full tech-input rounded-xl p-3 text-xs resize-none"></textarea>
        </div>
    </div>

    <div class="glass-card p-5 mb-6">
        <div class="flex justify-between items-center mb-5 border-b border-white/5 pb-3">
            <h3 class="text-sm font-bold uppercase tracking-widest text-white">🏋️‍♂️ Тренировка</h3>
            <span id="exercise-count" class="text-[10px] font-mono font-bold text-slate-500 bg-white/5 px-2 py-1 rounded">0/30</span>
        </div>
        <div id="workout-container" class="space-y-3 mb-5"></div>
        <button onclick="addExerciseField()" id="btn-add-exercise" class="w-full bg-white/5 hover:bg-white/10 border border-dashed border-white/10 hover:border-[#9EFF00]/50 text-slate-400 hover:text-white py-3.5 rounded-xl text-xs font-bold transition-all duration-300 cursor-pointer active:scale-[0.98]">
            + Добавить упражнение
        </button>
    </div>

    <div class="glass-card p-5 mb-6">
        <div class="flex justify-between items-center mb-5 border-b border-white/5 pb-3">
            <h3 class="text-sm font-bold uppercase tracking-widest text-white">📋 Режим & Диета</h3>
            <span id="day-progress" class="text-xs font-black tracking-widest px-2.5 py-1 rounded bg-[#9EFF00]/10 text-[#9EFF00] border border-[#9EFF00]/20">0%</span>
        </div>
        <div id="checklist-container" class="space-y-3 mb-5"></div>
        <div class="flex gap-2 pt-4 border-t border-white/5">
            <input type="text" id="new-task-text" placeholder="Добавить свою задачу..." class="flex-1 tech-input rounded-xl p-3 text-xs">
            <button onclick="addNewCustomTask()" class="bg-[#9EFF00] text-black font-black px-5 rounded-xl text-lg">+</button>
        </div>
    </div>

    <div class="glass-card p-5">
        <button onclick="resetChecklist()" class="w-full text-red-400/80 hover:text-red-300 text-[10px] uppercase tracking-widest py-3 px-3 rounded-xl transition-all bg-red-900/10">
            Сбросить день
        </button>
    </div>

    <div id="archive-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md" onclick="closeArchiveModal()"></div>
        <div class="glass-card w-full max-w-md max-h-[85vh] flex flex-col p-6 relative z-10">
            <h2 class="text-sm font-black uppercase text-white tracking-widest mb-4">Архив</h2>
            <div id="archive-content" class="overflow-y-auto flex-1 space-y-4 pr-2 text-xs text-slate-300"></div>
        </div>
    </div>

    <script>
        const startDate = new Date(2026, 6, 20); 
        const DB_KEY = 'sushka_db_v11'; 

        let selectedDay = localStorage.getItem('sushka_selected_day') ? parseInt(localStorage.getItem('sushka_selected_day')) : 1;
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || {};

        function buildCalendar() {
            calendarGrid.innerHTML = '';
            for (let i = 1; i <= 28; i++) {
                const btn = document.createElement('button');
                btn.className = `day-btn p-3 rounded-2xl flex flex-col items-center justify-center gap-1 cursor-pointer font-medium ${i === selectedDay ? 'active' : ''}`;
                btn.innerHTML = `<span class="opacity-50 text-[9px] uppercase font-mono">D${i}</span><span class="font-bold text-sm">${getDateStringForDay(i)}</span>`;
                btn.onclick = () => { selectedDay = i; localStorage.setItem('sushka_selected_day', i); loadDay(i); };
                calendarGrid.appendChild(btn);
            }
        }

        function loadDay(day) {
            const week = Math.ceil(day / 7);
            document.querySelectorAll('.day-btn').forEach((b, i) => b.className = `day-btn p-3 rounded-2xl flex flex-col items-center justify-center gap-1 cursor-pointer font-medium ${i+1 === day ? 'active' : ''}`);
            document.getElementById('current-week-label').innerText = `Неделя ${week}`;
            if (!db[`day${day}`]) db[`day${day}`] = { tasks: {}, customTasks: [], health: {}, exercises: [] };
            const h = db[`day${day}`].health;
            document.getElementById('input-weight').value = h.weight || '';
            document.getElementById('input-calories-fact').value = h.caloriesFact || '';
            document.getElementById('input-notes').value = h.notes || '';
            updateHeaderData();
        }

        function autoSaveDayData() {
            const dayKey = `day${selectedDay}`;
            db[dayKey].health = {
                weight: document.getElementById('input-weight').value,
                caloriesFact: document.getElementById('input-calories-fact').value,
                notes: document.getElementById('input-notes').value
            };
            localStorage.setItem(DB_KEY, JSON.stringify(db));
            updateHeaderData();
        }

        function getDateStringForDay(d) { return new Date(startDate.getTime() + (d-1)*86400000).toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit'}); }
        function updateHeaderData() { 
            document.getElementById('header-weight').innerText = db[`day${selectedDay}`].health.weight || '—';
            document.getElementById('header-calories').innerText = db[`day${selectedDay}`].health.caloriesFact || '0';
        }
        function openArchiveModal() { document.getElementById('archive-modal').classList.remove('hidden'); }
        function closeArchiveModal() { document.getElementById('archive-modal').classList.add('hidden'); }
        buildCalendar();
    </script>
</body>
</html>
