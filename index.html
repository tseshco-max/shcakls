    <style>
        :root {
            --neon: #9EFF00;
            --bg-dark: #070B0D;
            --glass-bg: rgba(17, 23, 27, 0.7);
            --glass-border: rgba(255, 255, 255, 0.06);
        }
        
        body { 
            background-color: var(--bg-dark); 
            color: #E2E8F0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient Background Orbs */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            pointer-events: none;
        }
        body::before {
            top: -80px;
            left: -80px;
            background: rgba(158, 255, 0, 0.12);
        }
        body::after {
            bottom: 20%;
            right: -80px;
            background: rgba(56, 189, 248, 0.08);
        }

        /* Стеклянная карточка под iPhone 12 */
        .glass-card { 
            background-color: var(--glass-bg); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        /* Кнопки дней */
        .day-btn { 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #94A3B8; 
            transition: all 0.2s ease;
        }
        .day-btn:active {
            transform: scale(0.95);
        }
        .day-btn.active { 
            background: var(--neon);
            color: var(--bg-dark); 
            font-weight: 800; 
            border-color: var(--neon);
            box-shadow: 0 0 15px rgba(158, 255, 0, 0.3);
        }
        .day-btn.completed { 
            border: 1px solid #38BDF8;
            background: rgba(56, 189, 248, 0.05);
        }

        /* Инпуты */
        .tech-input {
            background: rgba(0, 0, 0, 0.35);
            color: #FFF;
            border: 1px solid rgba(255, 255, 255, 0.08);
            outline: none;
            transition: all 0.2s ease;
        }
        .tech-input:focus {
            border-color: var(--neon);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: inset 0 0 0 1px var(--neon), 0 0 10px rgba(158, 255, 0, 0.15);
        }
        .tech-input::placeholder {
            color: #475569;
        }

        /* Убираем стрелочки у инпутов */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }

        /* Чекбоксы */
        .cyber-checkbox {
            appearance: none;
            width: 20px;
            height: 20px;
            min-width: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.3);
            display: grid;
            place-content: center;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .cyber-checkbox::before {
            content: "";
            width: 10px;
            height: 10px;
            border-radius: 3px;
            transform: scale(0);
            transition: 0.2s transform ease-in-out;
            background: var(--neon);
            box-shadow: 0 0 8px var(--neon);
        }
        .cyber-checkbox:checked {
            border-color: var(--neon);
        }
        .cyber-checkbox:checked::before {
            transform: scale(1);
        }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>

        let selectedDay = localStorage.getItem('sushka_selected_day') ? parseInt(localStorage.getItem('sushka_selected_day')) : 1;
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || {};

        const calendarGrid = document.getElementById('calendar-grid');
        const currentWeekLabel = document.getElementById('current-week-label');
        const weekDesc = document.getElementById('week-desc');
        const checklistContainer = document.getElementById('checklist-container');
        const healthTitle = document.getElementById('health-title');
        const dayProgressLabel = document.getElementById('day-progress');

        const headerCalories = document.getElementById('header-calories');
        const workoutContainer = document.getElementById('workout-container');

        buildCalendar();
        loadDay(selectedDay);

        function buildCalendar() {
            calendarGrid.innerHTML = '';
            for (let i = 1; i <= 28; i++) {
                const btn = document.createElement('button');
                btn.id = `btn-day-${i}`;
                btn.className = `day-btn p-2 rounded-xl flex flex-col items-center justify-center gap-0.5 cursor-pointer font-medium`;
                btn.innerHTML = `<span class="opacity-40 text-[8px] uppercase font-mono">D${i}</span><span class="font-bold text-xs leading-none">${getDateStringForDay(i)}</span>`;
                if (isDayFullyCompleted(i)) btn.classList.add('completed');
                btn.onclick = () => {
                    selectedDay = i;
                    localStorage.setItem('sushka_selected_day', selectedDay);
                    loadDay(i);
                };
                calendarGrid.appendChild(btn);
            }
        }

        function getWeekFromDay(day) { return Math.ceil(day / 7); }

        function isDayFullyCompleted(day) {
            const dayKey = `day${day}`;
            const week = getWeekFromDay(day);
            const totalBaseTasks = weekProtocols[week].tasks.length;
            if (!db[dayKey] || !db[dayKey].tasks) return false;
            const customTasksCount = db[dayKey].customTasks ? db[dayKey].customTasks.length : 0;
            const totalRequired = totalBaseTasks + customTasksCount;
            const checkedBaseCount = Object.values(db[dayKey].tasks).filter(Boolean).length;
            const checkedCustomCount = db[dayKey].customTasks ? db[dayKey].customTasks.filter(t => t.checked).length : 0;
            return (checkedBaseCount + checkedCustomCount) === totalRequired;
        }

        function updateHeaderData() {
            const dayKey = `day${selectedDay}`;
            const h = db[dayKey]?.health || {};
            
            if (h.weight) { 
                headerWeight.innerText = h.weight; 
            } else {
                let lastWeight = '—';
                for (let i = selectedDay - 1; i >= 1; i--) {
                    if (db[`day${i}`]?.health?.weight) { lastWeight = db[`day${i}`].health.weight; break; }
                }
                headerWeight.innerText = lastWeight;
            }

            headerCalories.innerText = h.caloriesFact || '0';
        }

        function loadDay(day) {
            const week = getWeekFromDay(day);
            const proto = weekProtocols[week];
            const dayKey = `day${day}`;

            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-day-${day}`);
            if (activeBtn) activeBtn.classList.add('active');

            currentWeekLabel.innerText = `Неделя ${week}`;
            weekDesc.innerHTML = `<span class="text-white font-medium mr-1">Фокус:</span> ${proto.desc}`;
            healthTitle.innerText = `🩺 Параметры (${getDateStringForDay(day)})`;

            if (!db[dayKey]) db[dayKey] = { tasks: {}, customTasks: [], health: {}, exercises: [] };
            if (!db[dayKey].health) db[dayKey].health = { weight: '', caloriesTarget: '1800', caloriesFact: '', steps: '', pulse: '', gastro: '', notes: '', workoutState: '', dietNotes: '' };
            if (!db[dayKey].customTasks) db[dayKey].customTasks = [];
            if (!db[dayKey].exercises) db[dayKey].exercises = [];

            const h = db[dayKey].health;

            document.getElementById('input-weight').value = h.weight || '';
            document.getElementById('input-calories-target').value = h.caloriesTarget || '1800';
            document.getElementById('input-calories-fact').value = h.caloriesFact || '';
            document.getElementById('input-steps').value = h.steps || '';
            document.getElementById('input-pulse').value = h.pulse || '';
            document.getElementById('input-gastro').value = h.gastro || '';
            document.getElementById('input-notes').value = h.notes || '';
            document.getElementById('input-workout-state').value = h.workoutState || '';
            document.getElementById('input-diet-notes').value = h.dietNotes || '';

            renderChecklist(proto.tasks, db[dayKey].tasks, db[dayKey].customTasks);
            renderWorkoutFields(db[dayKey].exercises);
            updateHeaderData();
            updateProgress();
            checkLiveAlerts();
        }

        function renderChecklist(baseTasks, checkedBase, customTasks) {
            checklistContainer.innerHTML = '';
            baseTasks.forEach(task => {
                const isChecked = checkedBase[task.id] ? 'checked' : '';
                const div = document.createElement('div');
                div.className = "flex items-start p-3 bg-black/20 rounded-xl border border-white/5";
                div.innerHTML = `
                    <input type="checkbox" id="${task.id}" ${isChecked} onchange="toggleTask('${task.id}', false)" class="cyber-checkbox mt-0.5">
                    <label for="${task.id}" class="ml-3 text-xs select-none cursor-pointer leading-tight text-slate-300 font-medium pt-0.5">${task.txt}</label>
                `;
                checklistContainer.appendChild(div);
            });

            customTasks.forEach((task, index) => {
                const isChecked = task.checked ? 'checked' : '';
                const div = document.createElement('div');
                div.className = "flex items-start p-3 bg-black/20 rounded-xl border border-dashed border-white/10";
                div.innerHTML = `
                    <input type="checkbox" id="custom-${index}" ${isChecked} onchange="toggleTask(${index}, true)" class="cyber-checkbox mt-0.5">
                    <label for="custom-${index}" class="ml-3 text-xs select-none cursor-pointer leading-tight flex-1 text-slate-300 font-medium pt-0.5">${task.txt}</label>
                    <button onclick="deleteCustomTask(${index})" class="text-xs text-slate-500 hover:text-red-400 ml-2 px-1.5 py-0.5 rounded bg-white/5 cursor-pointer">✕</button>
                `;
                checklistContainer.appendChild(div);
            });
        }

        window.autoSaveDayData = function() {
            const dayKey = `day${selectedDay}`;
            if (!db[dayKey]) db[dayKey] = { tasks: {}, customTasks: [], health: {}, exercises: [] };

            db[dayKey].health = {
                weight: document.getElementById('input-weight').value,
                caloriesTarget: document.getElementById('input-calories-target').value || '1800',
                caloriesFact: document.getElementById('input-calories-fact').value || '0',
                steps: document.getElementById('input-steps').value,
                pulse: document.getElementById('input-pulse').value,
                gastro: document.getElementById('input-gastro').value,
                notes: document.getElementById('input-notes').value,
                workoutState: document.getElementById('input-workout-state').value,
                dietNotes: document.getElementById('input-diet-notes').value
            };

            const rows = workoutContainer.getElementsByClassName('exercise-row');
            const savedExercises = [];
            for (let row of rows) {
                const name = row.querySelector('.ex-name').value.trim();
                const sets = row.querySelector('.ex-sets').value;
                const reps = row.querySelector('.ex-reps').value.trim();
                const weightEx = row.querySelector('.ex-weight').value.trim();
                if (name !== '' || sets !== '' || reps !== '' || weightEx !== '') {
                    savedExercises.push({ name, sets, reps, weight: weightEx });
                }
            }
            db[dayKey].exercises = savedExercises;

            saveDB();
            updateHeaderData();
            checkLiveAlerts();
            
            const btn = document.getElementById(`btn-day-${selectedDay}`);
            if (isDayFullyCompleted(selectedDay)) btn.classList.add('completed');
            else btn.classList.remove('completed');
        }

        function checkLiveAlerts() {
            const alertDiv = document.getElementById('health-alert');
            let alerts = [];
            const pulse = parseInt(document.getElementById('input-pulse').value);
            const gastro = document.getElementById('input-gastro').value.toLowerCase();

            if (pulse > 75) alerts.push("⚠️ <strong class='text-red-400'>Пульс покоя завышен:</strong> Возможна перегрузка ЦНС.");
            if (gastro.includes('горечь') || gastro.includes('тяжест') || gastro.includes('болит')) {
                alerts.push("⚠️ <strong class='text-red-400'>Дисфункция ЖКТ:</strong> Застой желчи. Нужен артишок/таурин.");
            }

            if (alerts.length > 0) {
                alertDiv.innerHTML = alerts.join('<br class="my-2">');
                alertDiv.classList.remove('hidden');
            } else {
                alertDiv.classList.add('hidden');
            }
        }

        window.addNewCustomTask = function() {
            const input = document.getElementById('new-task-text');
            const txt = input.value.trim();
            if (!txt) return;
            const dayKey = `day${selectedDay}`;
            db[dayKey].customTasks.push({ txt, checked: false });
            saveDB();
            input.value = '';
            loadDay(selectedDay);
        }

        window.deleteCustomTask = function(index) {
            const dayKey = `day${selectedDay}`;
            db[dayKey].customTasks.splice(index, 1);
            saveDB();
            loadDay(selectedDay);
        }

        window.toggleTask = function(id, isCustom) {
            const dayKey = `day${selectedDay}`;
            if (isCustom) db[dayKey].customTasks[id].checked = document.getElementById(`custom-${id}`).checked;
            else db[dayKey].tasks[id] = document.getElementById(id).checked;
            saveDB();
            updateProgress();
            buildCalendar();
            loadDay(selectedDay);
        }

        function updateProgress() {
            const week = getWeekFromDay(selectedDay);
            const baseTasksCount = weekProtocols[week].tasks.length;
            const dayKey = `day${selectedDay}`;
            const customTasksCount = db[dayKey]?.customTasks ? db[dayKey].customTasks.length : 0;
            const total = baseTasksCount + customTasksCount;
            const checkedBase = Object.values(db[dayKey]?.tasks || {}).filter(Boolean).length;
            const checkedCustom = db[dayKey]?.customTasks ? db[dayKey].customTasks.filter(t => t.checked).length : 0;
            const percent = total > 0 ? Math.round(((checkedBase + checkedCustom) / total) * 100) : 0;
            dayProgressLabel.innerText = `${percent}%`;
        }

        function renderWorkoutFields(exercisesArr) {
            workoutContainer.innerHTML = '';
            const fieldsCount = Math.max(2, exercisesArr.length);
            for (let i = 0; i < fieldsCount; i++) {
                const ex = exercisesArr[i] || { name: '', sets: '', reps: '', weight: '' };
                createExerciseRow(i, ex);
            }
            updateExerciseCountLabel();
        }

        function createExerciseRow(index, ex) {
            const div = document.createElement('div');
            div.className = "grid grid-cols-12 gap-1.5 items-center exercise-row";
            div.innerHTML = `
                <input type="text" placeholder="Упражнение" value="${ex.name}" oninput="autoSaveDayData()" class="col-span-5 tech-input rounded-xl p-2.5 text-xs anonymity-ex-name">
                <input type="number" placeholder="4" value="${ex.sets}" oninput="autoSaveDayData()" class="col-span-2 tech-input rounded-xl p-2.5 text-xs text-center ex-sets">
                <input type="text" placeholder="12" value="${ex.reps}" oninput="autoSaveDayData()" class="col-span-3 tech-input rounded-xl p-2.5 text-xs text-center ex-reps">
                <input type="text" placeholder="80" value="${ex.weight}" oninput="autoSaveDayData()" class="col-span-2 tech-input rounded-xl p-2.5 text-xs text-center text-[#9EFF00] font-bold ex-weight bg-black/40">
            `;
            div.querySelector('.anonymity-ex-name').className = "col-span-5 tech-input rounded-xl p-2.5 text-xs ex-name";
            workoutContainer.appendChild(div);
        }

        function addExerciseField() {
            const currentRows = workoutContainer.getElementsByClassName('exercise-row').length;
            if (currentRows >= 30) return alert("Максимум 30 упражнений!");
            createExerciseRow(currentRows, { name: '', sets: '', reps: '', weight: '' });
            updateExerciseCountLabel();
        }

        function updateExerciseCountLabel() {
            const currentRows = workoutContainer.getElementsByClassName('exercise-row').length;
            exerciseCountLabel.innerText = `${currentRows}/30`;
        }

        function saveDB() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }

        window.resetChecklist = function() {
            if(confirm("Стереть данные за этот день?")) {
                const dayKey = `day${selectedDay}`;
                db[dayKey] = { tasks: {}, customTasks: [], health: { caloriesTarget: '1800' }, exercises: [] };
                saveDB();
                buildCalendar();
                loadDay(selectedDay);
            }
        }

        window.openArchiveModal = function() { 
            document.getElementById('archive-modal').classList.remove('hidden'); 
            buildExerciseSelector(); 
            generateArchiveDOM();
        }
        window.closeArchiveModal = function() { document.getElementById('archive-modal').classList.add('hidden'); }

        function buildExerciseSelector() {
            const selector = document.getElementById('exercise-weight-selector');
            selector.innerHTML = '<option value="">-- Выберите упражнение --</option>';
            let allNames = new Set();
            historicalWorkouts.forEach(w => w.exercises.forEach(e => allNames.add(e.name.trim())));
            for (let i = 1; i <= 28; i++) {
                const dayExs = db[`day${i}`]?.exercises || [];
                dayExs.forEach(e => { if(e.name.trim()) allNames.add(e.name.trim()); });
            }
            const sortedNames = Array.from(allNames).sort((a, b) => a.localeCompare(b));
            sortedNames.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.innerText = name;
                selector.appendChild(opt);
            });
        }

        window.displayLastWorkingWeight = function() {
            const targetName = document.getElementById('exercise-weight-selector').value;
            const display = document.getElementById('last-weight-display');

            if (!targetName) {
                display.innerHTML = '<span class="text-slate-500 text-[11px]">Ожидание запроса...</span>';
                return;
            }

            let foundRecord = null;
            for (let i = 28; i >= 1; i--) {
                const dayExs = db[`day${i}`]?.exercises || [];
                const match = dayExs.find(e => e.name.trim() === targetName);
                if (match && match.weight) {
                    foundRecord = { date: getDateStringForDay(i) + '.2026', weight: match.weight, reps: match.reps, sets: match.sets };
                    break;
                }
            }

            if (!foundRecord) {
                for (let w of historicalWorkouts) {
                    const match = w.exercises.find(e => e.name.trim() === targetName);
                    if (match && match.weight && match.weight !== '—') {
                        foundRecord = { date: w.date, weight: match.weight, reps: match.reps, sets: match.sets };
                        break;
                    }
                }
            }

            if (foundRecord) {
                display.innerHTML = `
                    <div class="text-slate-300">
                        Вес: <span style="color: var(--neon);" class="font-black text-sm ml-1 mr-1">${foundRecord.weight}</span> 
                        <span class="text-slate-500 text-[10px]">(${foundRecord.sets || '—'}х${foundRecord.reps || '—'})</span> 
                        <div class="text-sky-400 text-[9px] font-semibold mt-0.5">${foundRecord.date}</div>
                    </div>
                `;
            } else {
                display.innerHTML = '<span class="text-red-400 font-mono text-[10px]">NULL: ВЕС НЕ НАЙДЕН</span>';
            }
        }

        function generateArchiveDOM() {
            const container = document.getElementById('archive-content');
            container.innerHTML = '';
            for (let i = 28; i >= 1; i--) {
                const dayKey = `day${i}`;
                const dayExs = db[dayKey]?.exercises || [];
                if (dayExs.length > 0) {
                    const section = document.createElement('div');
                    section.className = "p-3 rounded-xl bg-black/30 border border-white/5";
                    let exLines = '';
                    dayExs.forEach((ex, idx) => {
                        exLines += `<div class="py-1 border-b border-white/5 last:border-0 pl-1 text-slate-300 flex justify-between text-[11px]">
                            <span><span style="color: var(--neon);" class="font-bold mr-1">${idx + 1}.</span> ${ex.name}</span>
                            <span class="font-bold text-white">${ex.weight || '—'}</span>
                        </div>`;
                    });
                    section.innerHTML = `<div class="font-bold text-[11px] mb-2 pb-1.5 border-b flex justify-between border-white/10"><span style="color: var(--neon);">📅 ${getDateStringForDay(i)}.2026</span><span class="text-[8px] px-1.5 py-0.2 rounded uppercase bg-sky-500/10 text-sky-400">Сушка</span></div><div class="space-y-1">${exLines}</div>`;
                    container.appendChild(section);
                }
            }

            historicalWorkouts.forEach(workout => {
                const section = document.createElement('div');
                section.className = "p-3 rounded-xl bg-black/20 border border-white/5";
                let exLines = '';
                workout.exercises.forEach((ex, idx) => {
                    exLines += `<div class="py-1 border-b border-white/5 last:border-0 pl-1 text-slate-400 flex justify-between text-[11px]">
                        <span><span class="text-slate-500 font-bold mr-1">${idx + 1}.</span> ${ex.name}</span>
                        <span class="font-semibold text-slate-300">${ex.weight}</span>
                    </div>`;
                });
                section.innerHTML = `<div class="font-bold text-slate-500 text-[10px] mb-2 pb-1.5 border-b border-white/5">📅 ${workout.date}</div><div class="space-y-1">${exLines}</div>`;
                container.appendChild(section);
            });
        }

        window.exportTextReport = function() {
            let txt = `=========================================\n  ОТЧЕТ ПО ПРОТОКОЛУ ПОХУДЕНИЯ (28 ДНЕЙ) \n=========================================\n\n`;
            for (let i = 1; i <= 28; i++) {
                const dayKey = `day${i}`;
                if (db[dayKey]) {
                    const h = db[dayKey].health || {};
                    const exs = db[dayKey].exercises || [];
                    const customs = db[dayKey].customTasks || [];
                    if (h.weight || h.steps || h.pulse || h.notes || h.caloriesFact || exs.length > 0 || customs.length > 0) {
                        txt += `ДЕНЬ ${i} (${getDateStringForDay(i)}) [Неделя ${getWeekFromDay(i)}]\n-----------------------------------------\n`;
                        txt += `• Калории (План/Факт): ${h.caloriesTarget || '1800'} / ${h.caloriesFact || '0'} ккал\n`;
                        txt += `• Вес тела: ${h.weight || '—'} кг\n• Шаги: ${h.steps || '—'}\n• Пульс в покое: ${h.pulse || '—'} уд/мин\n• Состояние ЖКТ: ${h.gastro || 'Не указано'}\n`;
                        if(h.notes) txt += `• Заметки по состоянию: ${h.notes}\n`;
                        if(h.dietNotes) txt += `• Инфо по Диете: ${h.dietNotes}\n`;
                        if(customs.length > 0) {
                            txt += `• Свои задачи в чек-листе:\n`;
                            customs.forEach(c => txt += `  [${c.checked ? '✕' : ' '}] ${c.txt}\n`);
                        }
                        if(h.workoutState) txt += `• Самочувствие на тренировке: ${h.workoutState}\n`;
                        if (exs.length > 0) {
                            txt += `• Выполненные упражнения:\n`;
                            exs.forEach((ex, idx) => { txt += `  ${idx + 1}. ${ex.name} — ${ex.sets}х(${ex.reps}), вес: ${ex.weight || '—'} кг\n`; });
                        }
                        txt += `\n`;
                    }
                }
            }
            const blob = new Blob([txt], { type: "text/plain;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Sushka_Progress_Report.txt";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.exportData = function() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `sushka_db_v11_backup.json`);
            downloadAnchor.click();

        window.importData = function() {
            const jsonStr = prompt("Вставь JSON данные из файла бэкапа:");
            if (!jsonStr) return;
            try {
                const parsed = JSON.parse(jsonStr);
                if (typeof parsed === 'object') { db = parsed; saveDB(); buildCalendar(); loadDay(selectedDay); alert("Успешно импортировано!"); }
            } catch (e) { alert("Ошибка чтения файла."); }
        }
    </script>
