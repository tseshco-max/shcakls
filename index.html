    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
        .day-btn { background-color: #334155; transition: all 0.2s; }
        .day-btn.active { background-color: #f59e0b; color: #0f172a; font-weight: bold; }
        .day-btn.completed { border: 2px solid #10b981; }
    </style>

    <!-- HEADER -->

        <p class="text-xs text-slate-400 mt-1">

    <!-- КНОПКА ОТКРЫТИЯ АРХИВА ПРОШЛЫХ ТРЕНИРОВОК -->
    <button onclick="openArchiveModal()" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-2.5 px-4 rounded-xl text-xs uppercase tracking-wider transition mb-4 shadow-md flex items-center justify-center gap-2">
        📂 Просмотреть архив прошлых тренировок

        <p id="week-desc" class="text-xs text-slate-400 mt-3 italic bg-slate-800/50 p-2 rounded-lg border border-slate-700/30"></p>
    </div>

    <!-- ТРЕКЕР АКТИВНОСТИ И МАРКЕРОВ ЗДОРОВЬЯ -->

        <div class="grid grid-cols-3 gap-2 mb-3">
            <div>
                <label class="block text-[10px] text-slate-400 mb-1 text-center">Вес тела (кг)</label>

            </div>
            <div>
                <label class="block text-[10px] text-slate-400 mb-1 text-center">Ккал (План)</label>
                <input type="number" id="input-calories-target" placeholder="1660" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-slate-300 text-xs text-center font-semibold">
            </div>
            <div>
                <label class="block text-[10px] text-slate-400 mb-1 text-center">Ккал (Факт)</label>
                <input type="number" id="input-calories-fact" placeholder="0" class="w-full bg-slate-800 border border-amber-500/40 rounded-lg p-2 text-amber-400 text-xs text-center font-bold">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-3">
            <div>
                <label class="block text-[11px] text-slate-400 mb-1">Шаги за день</label>
                <input type="number" id="input-steps" placeholder="15000" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-emerald-400 text-xs text-center font-bold">
            </div>
            <div>
                <label class="block text-[11px] text-slate-400 mb-1">Пульс в покое</label>
                <input type="number" id="input-pulse" placeholder="уд/мин" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white text-xs text-center">
            </div>
        </div>

        <div class="mb-3">
            <label class="block text-xs text-slate-400 mb-1">Состояние ЖКТ</label>

        </div>
        
        <div class="mb-1">
            <label class="block text-xs text-slate-400 mb-1">Общее состояние / Заметки по дню</label>
            <textarea id="input-notes" rows="2" placeholder="Общий тонус, сон, менталка..." class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white text-sm resize-none"></textarea>
        </div>
    </div>

        </div>

        </div>

    </div>

                    { name: "Борцовские вращения", sets: "—", reps: "40 сек раб / 1:20 отд", weight: "10 кг; 20 кг" }

            },
            {

                    { name: "Жим лежа", sets: "3", reps: "10", weight: "40... кг" },
                    { name: "Вертикальная тяга", sets: "3", reps: "15; 10; 12", weight: "30... кг" },
                    { name: "Трицепс в кроссовере с прямой рукоятью", sets: "3", reps: "12; 10; 10", weight: "13; 14; 13... кг" },
                    { name: "Борцовское вращение блина", sets: "5 серий", reps: "30 сек раб / 1:30 отд", weight: "10 кг" }
                ]
            },
            {
                date: "16.05.2026",
                exercises: [
                    { name: "Пресс", sets: "—", reps: "—", weight: "—" },
                    { name: "Приведение плеча в кроссовере стоя", sets: "3", reps: "10", weight: "8; 6.8; 5.7... кг" },
                    { name: "Жим лежа", sets: "3", reps: "10; 8; 7", weight: "40... кг" },
                    { name: "Разгибание голени", sets: "3", reps: "10", weight: "32; 25; 32... кг" },
                    { name: "Фронтальная тяга с упором в грудь", sets: "3", reps: "15", weight: "30... кг" },
                    { name: "Вертикальная тяга", sets: "3", reps: "10", weight: "30; 23... кг" },
                    { name: "Борцовское вращение блина", sets: "5 серий", reps: "30 сек раб / 1:30 отд", weight: "10 кг" }
                ]
            }
        ];

        let selectedDay = localStorage.getItem('sushka_selected_day') ? parseInt(localStorage.getItem('sushka_selected_day')) : 1;
        let db = JSON.parse(localStorage.getItem('sushka_db_v8')) || {};

        const calendarGrid = document.getElementById('calendar-grid');
        const currentWeekLabel = document.getElementById('current-week-label');
        const weekDesc = document.getElementById('week-desc');
        const checklistContainer = document.getElementById('checklist-container');
        const healthTitle = document.getElementById('health-title');
        const dayProgressLabel = document.getElementById('day-progress');
        const headerWeight = document.getElementById('header-weight');
        const headerCalories = document.getElementById('header-calories');
        const workoutContainer = document.getElementById('workout-container');
        const exerciseCountLabel = document.getElementById('exercise-count');

        buildCalendar();
        loadDay(selectedDay);
        generateArchiveDOM();

        function buildCalendar() {
            calendarGrid.innerHTML = '';
            for (let i = 1; i <= 28; i++) {
                const btn = document.createElement('button');
                btn.id = `btn-day-${i}`;
                btn.className = `day-btn p-2 rounded-xl text-[11px] font-medium text-slate-200 focus:outline-none flex flex-col items-center justify-center gap-0.5`;
                btn.innerHTML = `<span class="opacity-50 text-[9px]">Дн ${i}</span><span class="font-bold text-white">${getDateStringForDay(i)}</span>`;
                if (isDayFullyCompleted(i)) btn.classList.add('completed');
                btn.onclick = () => {
                    selectedDay = i;
                    localStorage.setItem('sushka_selected_day', selectedDay);
                    loadDay(i);
                };
                calendarGrid.appendChild(btn);
            }
        }

        function getWeekFromDay(day) { return Math.ceil(day / 7); }

        function isDayFullyCompleted(day) {
            const dayKey = `day${day}`;
            const week = getWeekFromDay(day);
            const totalBaseTasks = weekProtocols[week].tasks.length;
            if (!db[dayKey] || !db[dayKey].tasks) return false;
            const customTasksCount = db[dayKey].customTasks ? db[dayKey].customTasks.length : 0;
            const totalRequired = totalBaseTasks + customTasksCount;
            const checkedBaseCount = Object.values(db[dayKey].tasks).filter(Boolean).length;
            const checkedCustomCount = db[dayKey].customTasks ? db[dayKey].customTasks.filter(t => t.checked).length : 0;
            return (checkedBaseCount + checkedCustomCount) === totalRequired;
        }

        function updateHeaderData() {
            const dayKey = `day${selectedDay}`;
            const h = db[dayKey]?.health || {};
            if (h.weight) { headerWeight.innerText = h.weight; } else {
                let lastWeight = 100;
                for (let i = selectedDay; i >= 1; i--) {
                    if (db[`day${i}`]?.health?.weight) { lastWeight = db[`day${i}`].health.weight; break; }
                }
                headerWeight.innerText = lastWeight;
            }
            const target = h.caloriesTarget || '1660';
            const fact = h.caloriesFact || '0';
            headerCalories.innerText = `${target} / ${fact}`;
        }

        function loadDay(day) {
            const week = getWeekFromDay(day);
            const proto = weekProtocols[week];
            const dayKey = `day${day}`;

            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-day-${day}`);
            if (activeBtn) activeBtn.classList.add('active');

            currentWeekLabel.innerText = `Неделя ${week}`;
            weekDesc.innerText = proto.desc;
            healthTitle.innerText = `🩺 Маркеры и Активность (${getDateStringForDay(day)} — День ${day})`;

            if (!db[dayKey]) db[dayKey] = { tasks: {}, customTasks: [], health: {}, exercises: [] };
            if (!db[dayKey].health) db[dayKey].health = { weight: '', caloriesTarget: '1660', caloriesFact: '', steps: '', pulse: '', gastro: '', notes: '', workoutState: '', dietNotes: '' };
            if (!db[dayKey].customTasks) db[dayKey].customTasks = [];
            if (!db[dayKey].exercises) db[dayKey].exercises = [];

            const h = db[dayKey].health;

            document.getElementById('input-weight').value = h.weight || '';
            document.getElementById('input-calories-target').value = h.caloriesTarget || '1660';
            document.getElementById('input-calories-fact').value = h.caloriesFact || '';
            document.getElementById('input-steps').value = h.steps || '';
            document.getElementById('input-pulse').value = h.pulse || '';
            document.getElementById('input-gastro').value = h.gastro || '';
            document.getElementById('input-notes').value = h.notes || '';
            document.getElementById('input-workout-state').value = h.workoutState || '';
            document.getElementById('input-diet-notes').value = h.dietNotes || '';
            document.getElementById('health-alert').classList.add('hidden');

            renderChecklist(proto.tasks, db[dayKey].tasks, db[dayKey].customTasks);
            renderWorkoutFields(db[dayKey].exercises);
            updateHeaderData();
            updateProgress();
        }

        function renderChecklist(baseTasks, checkedBase, customTasks) {
            checklistContainer.innerHTML = '';
            baseTasks.forEach(task => {
                const isChecked = checkedBase[task.id] ? 'checked' : '';
                const div = document.createElement('div');
                div.className = "flex items-start p-2.5 bg-slate-800 rounded-xl border border-slate-700/50";
                div.innerHTML = `
                    <input type="checkbox" id="${task.id}" ${isChecked} onchange="toggleTask('${task.id}', false)" 
                        class="w-5 h-5 rounded text-amber-500 bg-slate-900 border-slate-700 mt-0.5 accent-amber-500">
                    <label for="${task.id}" class="ml-3 text-sm text-slate-200 select-none cursor-pointer leading-tight">${task.txt}</label>
                `;
                checklistContainer.appendChild(div);
            });

            customTasks.forEach((task, index) => {
                const isChecked = task.checked ? 'checked' : '';
                const div = document.createElement('div');
                div.className = "flex items-start p-2.5 bg-slate-800 rounded-xl border border-amber-500/20";
                div.innerHTML = `
                    <input type="checkbox" id="custom-${index}" ${isChecked} onchange="toggleTask(${index}, true)" 
                        class="w-5 h-5 rounded text-amber-500 bg-slate-900 border-slate-700 mt-0.5 accent-amber-500">
                    <label for="custom-${index}" class="ml-3 text-sm text-amber-100/90 select-none cursor-pointer leading-tight flex-1">${task.txt}</label>
                    <button onclick="deleteCustomTask(${index})" class="text-xs text-red-400 hover:text-red-300 ml-2 px-1">✕</button>
                `;
                checklistContainer.appendChild(div);
            });
        }

        window.addNewCustomTask = function() {
            const input = document.getElementById('new-task-text');
            const txt = input.value.trim();
            if (!txt) return;
            const dayKey = `day${selectedDay}`;
            db[dayKey].customTasks.push({ txt, checked: false });
            saveDB();
            input.value = '';
            loadDay(selectedDay);
        }

        window.deleteCustomTask = function(index) {
            const dayKey = `day${selectedDay}`;
            db[dayKey].customTasks.splice(index, 1);
            saveDB();
            loadDay(selectedDay);
        }

        window.toggleTask = function(id, isCustom) {
            const dayKey = `day${selectedDay}`;
            if (isCustom) {
                db[dayKey].customTasks[id].checked = document.getElementById(`custom-${id}`).checked;
            } else {
                db[dayKey].tasks[id] = document.getElementById(id).checked;
            }
            saveDB();
            updateProgress();
            buildCalendar();
            loadDay(selectedDay);
        }

        function updateProgress() {
            const week = getWeekFromDay(selectedDay);
            const baseTasksCount = weekProtocols[week].tasks.length;
            const dayKey = `day${selectedDay}`;
            const customTasksCount = db[dayKey]?.customTasks ? db[dayKey].customTasks.length : 0;
            const total = baseTasksCount + customTasksCount;
            const checkedBase = Object.values(db[dayKey]?.tasks || {}).filter(Boolean).length;
            const checkedCustom = db[dayKey]?.customTasks ? db[dayKey].customTasks.filter(t => t.checked).length : 0;
            const totalChecked = checkedBase + checkedCustom;
            const percent = total > 0 ? Math.round((totalChecked / total) * 100) : 0;
            dayProgressLabel.innerText = `${percent}%`;
        }

        function renderWorkoutFields(exercisesArr) {
            workoutContainer.innerHTML = '';
            const fieldsCount = Math.max(2, exercisesArr.length);
            for (let i = 0; i < fieldsCount; i++) {
                const ex = exercisesArr[i] || { name: '', sets: '', reps: '', weight: '' };
                createExerciseRow(i, ex);
            }
            updateExerciseCountLabel();
        }

        function createExerciseRow(index, ex) {
            const div = document.createElement('div');
            div.className = "grid grid-cols-12 gap-1 items-center exercise-row";
            div.innerHTML = `
                <input type="text" placeholder="Упражнение" value="${ex.name}" class="col-span-5 ex-name bg-slate-800 border border-slate-700 rounded-lg p-1.5 text-white text-xs">
                <input type="number" placeholder="4" value="${ex.sets}" class="col-span-2 ex-sets bg-slate-800 border border-slate-700 rounded-lg p-1.5 text-white text-xs text-center">
                <input type="text" placeholder="12" value="${ex.reps}" class="col-span-3 ex-reps bg-slate-800 border border-slate-700 rounded-lg p-1.5 text-white text-xs text-center">
                <input type="text" placeholder="80" value="${ex.weight}" class="col-span-2 ex-weight bg-slate-800 border border-slate-700 rounded-lg p-1.5 text-white text-xs text-center">
            `;
            workoutContainer.appendChild(div);
        }

        window.addExerciseField = function() {
            const currentRows = workoutContainer.getElementsByClassName('exercise-row').length;
            if (currentRows >= 30) return alert("Максимум 30 упражнений!");
            createExerciseRow(currentRows, { name: '', sets: '', reps: '', weight: '' });
            updateExerciseCountLabel();
        }

        function updateExerciseCountLabel() {
            const currentRows = workoutContainer.getElementsByClassName('exercise-row').length;
            exerciseCountLabel.innerText = `${currentRows}/30`;
        }

        window.saveAllDayData = function() {
            const dayKey = `day${selectedDay}`;
            db[dayKey].health = {
                weight: document.getElementById('input-weight').value,
                caloriesTarget: document.getElementById('input-calories-target').value || '1660',
                caloriesFact: document.getElementById('input-calories-fact').value || '0',
                steps: document.getElementById('input-steps').value,
                pulse: document.getElementById('input-pulse').value,
                gastro: document.getElementById('input-gastro').value,
                notes: document.getElementById('input-notes').value,
                workoutState: document.getElementById('input-workout-state').value,
                dietNotes: document.getElementById('input-diet-notes').value
            };

            const rows = workoutContainer.getElementsByClassName('exercise-row');
            const savedExercises = [];
            for (let row of rows) {
                const name = row.querySelector('.ex-name').value.trim();
                const sets = row.querySelector('.ex-sets').value;
                const reps = row.querySelector('.ex-reps').value.trim();
                const weightEx = row.querySelector('.ex-weight').value.trim();
                if (name !== '') savedExercises.push({ name, sets, reps, weight: weightEx });
            }
            db[dayKey].exercises = savedExercises;

            saveDB();
            updateHeaderData();
            buildCalendar();

            const alertDiv = document.getElementById('health-alert');
            let alerts = [];
            const pulseNum = parseInt(db[dayKey].health.pulse);
            if (pulseNum > 75) alerts.push("⚠️ <b>Высокий пульс:</b> Обрати внимание на интенсивность кардио и восстановление.");
            
            alertDiv.classList.remove('hidden');
            if (alerts.length > 0) {
                alertDiv.innerHTML = alerts.join('<br class="my-2">');
                alertDiv.className = "p-3 rounded-xl text-xs bg-red-900/40 border border-red-700 text-red-200 mb-4";
            } else {
                alertDiv.innerHTML = "✅ Данные успешно сохранены!";
                alertDiv.className = "p-3 rounded-xl text-xs bg-emerald-900/40 border border-emerald-700 text-emerald-200 mb-4";
            }
        }

        function saveDB() { localStorage.setItem('sushka_db_v8', JSON.stringify(db)); }

        window.resetChecklist = function() {
            if(confirm("Полностью стереть данные за этот день?")) {
                const dayKey = `day${selectedDay}`;
                db[dayKey] = { tasks: {}, customTasks: [], health: {}, exercises: [] };
                saveDB();
                buildCalendar();
                loadDay(selectedDay);
            }
        }

        // МОДАЛЬНОЕ ОКНО — ЛОГИКА
        window.openArchiveModal = function() { document.getElementById('archive-modal').classList.remove('hidden'); }
        window.closeArchiveModal = function() { document.getElementById('archive-modal').classList.add('hidden'); }

        function generateArchiveDOM() {
            const container = document.getElementById('archive-content');
            container.innerHTML = '';
            historicalWorkouts.forEach(workout => {
                const section = document.createElement('div');
                section.className = "p-3 bg-slate-800 rounded-xl border border-slate-700/60";
                
                let exLines = '';
                workout.exercises.forEach((ex, idx) => {
                    exLines += `<div class="py-1 border-b border-slate-700/40 last:border-0 pl-1">
                        <span class="text-amber-400 font-semibold">${idx + 1}. ${ex.name}</span> — ${ex.sets}х(${ex.reps}) <span class="text-sky-400">${ex.weight}</span>
                    </div>`;
                });

                section.innerHTML = `
                    <div class="font-bold text-white text-sm mb-2 pb-1 border-b border-sky-500/30 flex justify-between">
                        <span>📅 Дата: ${workout.date}</span>
                    </div>
                    <div class="space-y-1">${exLines}</div>
                `;
                container.appendChild(section);
            });
        }

        window.exportTextReport = function() {
            let txt = `=========================================\n`;
            txt += `    ОТЧЕТ ПО ПРОТОКОЛУ СУШКИ (28 ДНЕЙ)   \n`;
            txt += `=========================================\n\n`;

            for (let i = 1; i <= 28; i++) {
                const dayKey = `day${i}`;
                if (db[dayKey]) {
                    const h = db[dayKey].health || {};
                    const exs = db[dayKey].exercises || [];
                    const customs = db[dayKey].customTasks || [];
                    
                    if (h.weight || h.steps || h.pulse || h.notes || h.caloriesFact || exs.length > 0 || customs.length > 0) {
                        txt += `ДЕНЬ ${i} (${getDateStringForDay(i)}) [Неделя ${getWeekFromDay(i)}]\n`;
                        txt += `-----------------------------------------\n`;
                        txt += `• Калории (План/Факт): ${h.caloriesTarget || '1660'} / ${h.caloriesFact || '0'} ккал\n`;
                        txt += `• Вес тела: ${h.weight || '—'} кг\n`;
                        txt += `• Шаги: ${h.steps || '—'}\n`;
                        txt += `• Пульс в покое: ${h.pulse || '—'} уд/мин\n`;
                        txt += `• Состояние ЖКТ: ${h.gastro || 'Не указано'}\n`;
                        if(h.notes) txt += `• Заметки по состоянию: ${h.notes}\n`;
                        if(h.dietNotes) txt += `• Инфо по Диете: ${h.dietNotes}\n`;
                        
                        if(customs.length > 0) {
                            txt += `• Свои задачи в чек-листе:\n`;
                            customs.forEach(c => txt += `  [${c.checked ? '✕' : ' '}] ${c.txt}\n`);
                        }
                        if(h.workoutState) txt += `• Самочувствие на тренировке: ${h.workoutState}\n`;
                        if (exs.length > 0) {
                            txt += `• Выполненные упражнения:\n`;
                            exs.forEach((ex, idx) => {
                                txt += `  ${idx + 1}. ${ex.name} — ${ex.sets}х(${ex.reps}), вес: ${ex.weight || '—'} кг\n`;
                            });
                        }
                        txt += `\n`;
                    }
                }
            }

            // Добавляем старую историю в конец текстового файла при выгрузке
            txt += `=========================================\n`;
            txt += `        АРХИВ ПРОШЛЫХ ТРЕНИРОВОК         \n`;
            txt += `=========================================\n\n`;
            historicalWorkouts.forEach(w => {
                txt += `Дата: ${w.date}\n`;
                w.exercises.forEach((ex, idx) => {
                    txt += `  ${idx + 1}. ${ex.name} — ${ex.sets}х(${ex.reps}) вес: ${ex.weight}\n`;
                });
                txt += `\n`;
            });

            const blob = new Blob([txt], { type: "text/plain;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Sushka_Progress_With_Archive.txt";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.exportData = function() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `sushka_db_v8_backup.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        window.importData = function() {
            const jsonStr = prompt("Вставь JSON данные из файла бэкапа:");
            if (!jsonStr) return;
            try {
                const parsed = JSON.parse(jsonStr);
                if (typeof parsed === 'object') {
                    db = parsed;
                    saveDB();
                    buildCalendar();
                    loadDay(selectedDay);
                    alert("Успешно импортировано!");
                }
            } catch (e) { alert("Ошибка чтения файла."); }
        }
    </script>
